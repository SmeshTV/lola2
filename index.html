  <body>
    <div id="root"></div>
    <noscript>
      <div style="color: white; text-align: center; padding: 50px; font-family: system-ui;">
        <h1>🍄 LOLA</h1>
        <p>Для работы сайта необходим JavaScript. Включите JS в настройках браузера.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Блокировка только на десктопе (не трогаем мобильные)
      var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 1024;

      if (!isMobile) {
        // Блокировка правого клика
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

        // Блокировка горячих клавиш
        document.addEventListener('keydown', function(e) {
          if (e.key === 'F12') return false;
          if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i')) return false;
          if (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.key === 'j')) return false;
          if (e.ctrlKey && e.shiftKey && (e.key === 'C' || e.key === 'c')) return false;
          if (e.ctrlKey && (e.key === 'U' || e.key === 'u')) return false;
          if (e.ctrlKey && (e.key === 'S' || e.key === 's')) return false;
          return true;
        });
      }
    </script>
